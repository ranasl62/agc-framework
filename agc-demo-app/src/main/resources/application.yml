spring:
  application:
    name: agc-demo
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:agc;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

agc:
  enabled: true
  governance:
    mode: DEVELOPMENT
  tools:
    # Allowlist: tools not listed are denied with TOOL_NOT_REGISTERED (see demo scenario unknown_tool_not_registered).
    allowed:
      - search
      - read
      - delete_db
      - payment_api
  policy:
    roles:
      user:
        - search
        - read
      admin:
        - "*"
  guardrails:
    rules:
      - id: block-payment
        toolName: payment_api
        action: DENY
      - id: warn-read-sensitive
        toolName: read
        action: WARN
  llm:
    planned-tool-name: search
  audit:
    mode: STRICT
    max-payload-chars: 4000

logging:
  level:
    com.framework.agent: INFO
